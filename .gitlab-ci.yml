stages:
  - lint
  - format
  - type_check
  - security
  - test
  - coverage

image: python:3.13

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip
    - .venv/

before_script:
  - python -V
  - python -m venv .venv
  - source .venv/bin/activate
  - pip install --upgrade pip
  - pip install -r requirements.txt

# --- LINT STAGE ---
ruff-lint:
  stage: lint
  script:
    - ruff check .

flake8-lint:
  stage: lint
  script:
    - flake8 .

pylint-lint:
  stage: lint
  script:
    - pylint modules/

vulture-dead-code:
  stage: lint
  script:
    - vulture

pyupgrade-check:
  stage: lint
  script:
    - pre-commit run pyupgrade --all-files || true

# --- FORMAT STAGE ---
black-format:
  stage: format
  script:
    - black --check .

ruff-format:
  stage: format
  script:
    - ruff format --check .

# --- TYPE CHECK STAGE ---
mypy-typecheck:
  stage: type_check
  script:
    - mypy .

# --- SECURITY STAGE ---
bandit-sast:
  stage: security
  script:
    - bandit -c pyproject.toml -r modules/

dependency-audit:
  stage: security
  script:
    - pip-audit --local

secret-scanning:
  stage: security
  script:
    - detect-secrets scan --baseline .secrets.baseline

# --- TEST STAGE ---
pytest-run:
  stage: test
  script:
    - pytest

# --- COVERAGE STAGE ---
pytest-coverage:
  stage: coverage
  script:
    - pytest --cov=modules --cov-report=term-missing
  coverage: '/TOTAL\s+\d+\s+\d+\s+(\d+\%)/'
